name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Move Pom.xml to Root
        run: mv .github/workflows/pom.xml ./pom.xml

      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=iamneo-production_9efd1a7b-f6a5-4bd4-94dd-33b24da0247e-d3377915-b268-435c-88fd-5753bd253b01 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Trigger API
        if: always()
        run: |
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d '/' -f 2)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          curl -X POST -H "Content-Type: application/json" \
            -d "{ \"repo_id\": \"$REPO_NAME\", \"branch_name\": \"$BRANCH_NAME\", \"api_secret\": \"${{ secrets.API_SECRET }}\" }" \
            ${{ secrets.API_URL }}

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: sonar
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: SSH into EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest code
            if [ -d "David" ]; then
              cd David && git pull origin master
            else
              git clone https://github.com/david578-arc/David.git && cd David
            fi

            # Set env variables
            export DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            export DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

            # Stop old containers, rebuild and start
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d

            # Cleanup unused images
            docker image prune -f
