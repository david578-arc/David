name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Move Pom.xml to Root
        run: mv .github/workflows/pom.xml ./pom.xml

      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=iamneo-production_9efd1a7b-f6a5-4bd4-94dd-33b24da0247e-d3377915-b268-435c-88fd-5753bd253b01 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Trigger API
        if: always()
        run: |
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d '/' -f 2)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          curl -X POST -H "Content-Type: application/json" \
            -d "{ \"repo_id\": \"$REPO_NAME\", \"branch_name\": \"$BRANCH_NAME\", \"api_secret\": \"${{ secrets.API_SECRET }}\" }" \
            ${{ secrets.API_URL }}

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: sonar
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springapp
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fifa-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./reactapp
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fifa-frontend:latest

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Trigger Railway Backend Deploy
        run: curl -X POST "${{ secrets.RAILWAY_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Railway Frontend Deploy
        run: curl -X POST "${{ secrets.RAILWAY_FRONTEND_DEPLOY_HOOK }}"
