name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND: fifa-backend
  ECR_FRONTEND: fifa-frontend

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Move Pom.xml to Root
        run: mv .github/workflows/pom.xml ./pom.xml

      - name: SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=iamneo-production_9efd1a7b-f6a5-4bd4-94dd-33b24da0247e-d3377915-b268-435c-88fd-5753bd253b01 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Trigger API
        if: always()
        run: |
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d '/' -f 2)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          curl -X POST -H "Content-Type: application/json" \
            -d "{ \"repo_id\": \"$REPO_NAME\", \"branch_name\": \"$BRANCH_NAME\", \"api_secret\": \"${{ secrets.API_SECRET }}\" }" \
            ${{ secrets.API_URL }}

  build-and-deploy:
    name: Build, Push to ECR & Deploy to ECS
    runs-on: ubuntu-latest
    needs: sonar
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:latest ./springapp
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest

      - name: Build & Push Frontend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./reactapp
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster fifa-cluster \
            --service fifa-backend-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service \
            --cluster fifa-cluster \
            --service fifa-frontend-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
