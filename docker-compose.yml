version: '3.8'

services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-examly}
      MYSQL_DATABASE: appdb
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  springapp:
    build: ./springapp
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/appdb?createDatabaseIfNotExist=true
      DATABASE_USERNAME: ${DATABASE_USERNAME:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-examly}
    depends_on:
      mysql:
        condition: service_healthy

  reactapp:
    build: ./reactapp
    restart: always
    ports:
      - "80:80"
    depends_on:
      - springapp

volumes:
  mysql_data:
